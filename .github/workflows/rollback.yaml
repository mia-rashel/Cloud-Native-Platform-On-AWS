# Run this manually from GitHub when you need to roll back a bad deploy
name: Rollback
 
on:
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to roll back"
        required: true
        type: choice
        options: [nodejs-app, python-app]
      image_tag:
        description: "Git SHA of the version to restore (find it in previous pipeline runs)"
        required: true
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]
 
jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}
    - run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}
    - run: |
        ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
        IMAGE="${ACCOUNT}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/devops-platform/${{ inputs.service }}:${{ inputs.image_tag }}"
        kubectl set image deployment/${{ inputs.service }} \
          ${{ inputs.service }}=$IMAGE -n app
        kubectl rollout status deployment/${{ inputs.service }} -n app
