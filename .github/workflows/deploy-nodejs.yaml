name: Deploy Node.js App
 
# Triggers when you push to main and changed files in services/nodejs-app/
on:
  push:
    branches: [main]
    paths:
      - "services/nodejs-app/**"
      - ".github/workflows/deploy-nodejs.yaml"
 
env:
  ECR_REPOSITORY: devops-platform/nodejs-app
 
jobs:
  # ── JOB 1: Run tests ────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
 
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: services/nodejs-app/package-lock.json
 
    - name: Install dependencies
      run: npm ci
      working-directory: services/nodejs-app
 
    - name: Run tests
      run: npm test
      working-directory: services/nodejs-app
 
  # ── JOB 2: Build Docker image and push to ECR ───────────
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write   # needed for OIDC authentication to AWS
      contents: read
    outputs:
      image: ${{ steps.build.outputs.image }}
 
    steps:
    - uses: actions/checkout@v4
 
    - name: Configure AWS credentials (OIDC — no stored keys)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}
 
    - name: Log in to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
 
    - name: Build and push Docker image
      id: build
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG services/nodejs-app
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
 
  # ── JOB 3: Deploy to STAGING (automatic) ────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging       # no approval needed — deploys automatically
    permissions:
      id-token: write
      contents: read
 
    steps:
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}
 
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}
 
    - name: Deploy to staging
      run: |
        kubectl set image deployment/nodejs-app \
          nodejs-app=${{ needs.build.outputs.image }} \
          -n app
        kubectl rollout status deployment/nodejs-app -n app --timeout=300s
 
    - name: Smoke test
      run: |
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.${{ vars.DOMAIN_NAME }}/health)
          if [ "$STATUS" = "200" ]; then echo "Staging OK"; exit 0; fi
          sleep 10
        done
        echo "Staging health check failed" && exit 1
 
  # ── JOB 4: Deploy to PRODUCTION (requires your approval) ─
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment: production    # PAUSES here — you must approve in GitHub UI
    permissions:
      id-token: write
      contents: read
 
    steps:
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}
 
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}
 
    - name: Deploy to production
      run: |
        kubectl set image deployment/nodejs-app \
          nodejs-app=${{ needs.build.outputs.image }} \
          -n app
        kubectl rollout status deployment/nodejs-app -n app --timeout=300s
