apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: db-credentials
  namespace: app
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "devops-platform/dev/db-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: username
            objectAlias: DB_USER
          - path: password
            objectAlias: DB_PASS
          - path: host
            objectAlias: DB_HOST
          - path: dbname
            objectAlias: DB_NAME
  secretObjects:
  - secretName: db-credentials
    type: Opaque
    data:
    - objectName: DB_USER
      key: username
    - objectName: DB_PASS
      key: password
    - objectName: DB_HOST
      key: host
    - objectName: DB_NAME
      key: dbname
