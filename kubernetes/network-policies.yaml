# Default: block ALL traffic between pods in the app namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow the load balancer to reach the Node.js pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-nodejs
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: nodejs-app
  ingress:
  - ports:
    - port: 3000
  policyTypes:
  - Ingress
---
# Allow the load balancer to reach the Python pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-python
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: python-app
  ingress:
  - ports:
    - port: 8000
  policyTypes:
  - Ingress
---
# Allow app pods to reach RDS (port 5432) and AWS APIs (port 443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: devops-platform
  egress:
  - ports:
    - port: 5432
    - port: 443
  policyTypes:
  - Egress
---
# Allow Prometheus (in monitoring namespace) to scrape /metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: app
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    ports:
    - port: 3000
    - port: 8000
  policyTypes:
  - Ingress
